<style>
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
@keyframes slideDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

.anim-fade-up { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; }
.anim-fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
.anim-scale-in { animation: scaleIn 0.6s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; }
.anim-slide-down { animation: slideDown 0.5s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; }
.anim-float { animation: float 3s ease-in-out infinite; }
.delay-1 { animation-delay: 0.1s; }
.delay-2 { animation-delay: 0.2s; }
.delay-3 { animation-delay: 0.3s; }
.delay-4 { animation-delay: 0.4s; }
.delay-5 { animation-delay: 0.5s; }
.delay-6 { animation-delay: 0.6s; }
.delay-7 { animation-delay: 0.7s; }

.avatar-wrap { position: relative; width: 120px; height: 120px; }
.avatar-wrap::before { content: ''; position: absolute; inset: -3px; border-radius: 50%; background: linear-gradient(135deg, #1a1a1a, #333, #1a1a1a); z-index: 0; }
.avatar-img { position: relative; z-index: 1; width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #1a1a1a; }

.social-icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 14px; background: #111111; border: 1px solid #1a1a1a; color: #666; font-size: 22px; transition: all 0.3s cubic-bezier(0.16,1,0.3,1); cursor: pointer; text-decoration: none; }
.social-icon:hover { transform: translateY(-3px) scale(1.05); border-color: #333; }
.social-icon.spotify:hover { color: #1DB954; background: rgba(29,185,84,0.08); border-color: rgba(29,185,84,0.2); }
.social-icon.instagram:hover { color: #E4405F; background: rgba(228,64,95,0.08); border-color: rgba(228,64,95,0.2); }
.social-icon.tiktok:hover { color: #fff; background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); }
.social-icon.youtube:hover { color: #FF0000; background: rgba(255,0,0,0.08); border-color: rgba(255,0,0,0.2); }

.link-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 16px; padding: 20px; transition: all 0.3s ease; flex: 1; min-width: 0; }
.link-card:hover { border-color: #262626; transform: translateY(-2px); }

.copy-btn { background: #111111; border: 1px solid #1a1a1a; color: #888; padding: 8px 14px; border-radius: 10px; font-size: 11px; font-weight: 500; transition: all 0.2s ease; cursor: pointer; white-space: nowrap; }
.copy-btn:hover { background: #161616; border-color: #333; color: #fff; }
.copy-btn:active { transform: scale(0.97); }

.btn-join { display: inline-flex; align-items: center; gap: 5px; padding: 8px 14px; border-radius: 10px; font-size: 11px; font-weight: 600; transition: all 0.2s ease; text-decoration: none; white-space: nowrap; }
.btn-join.discord { background: #5865F2; color: white; }
.btn-join.discord:hover { background: #4752C4; transform: translateY(-1px); }
.btn-join.store { background: #fff; color: #000; }
.btn-join.store:hover { background: #e0e0e0; transform: translateY(-1px); }

.toast { animation: fadeUp 0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
.toast-out { animation: fadeIn 0.25s ease reverse forwards; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #000; }
::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 2px; }

<!-- Toast Container -->
<div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none"></div>

<script>
function copyLink(text, toastId) {
navigator.clipboard.writeText(text).then(() => {
showToast('Link copied!', toastId);
}).catch(() => {
var ta = document.createElement('textarea');
ta.value = text;
ta.style.cssText = 'position:fixed;left:-9999px;';
document.body.appendChild(ta);
ta.select();
try { document.execCommand('copy'); showToast('Link copied!', toastId); }
catch { showToast('Failed to copy', toastId, true); }
document.body.removeChild(ta);
});
}

function showToast(msg, id, isError) {
var container = document.getElementById('toast-container');
var existing = document.getElementById(id);
if (existing) existing.remove();
var toast = document.createElement('div');
toast.id = id;
toast.className = 'toast pointer-events-auto flex items-center gap-2 px-4 py-2.5 rounded-lg text-xs font-semibold shadow-xl ' + (isError ? 'bg-red-950/90 border border-red-800 text-red-400' : 'bg-surface border border-border text-white');
toast.innerHTML = '<i class="ph-fill ' + (isError ? 'ph-x-circle text-red-400' : 'ph-check-circle text-green-400') + '"></i><span>' + msg + '</span>';
container.appendChild(toast);
setTimeout(function() {
toast.classList.add('toast-out');
setTimeout(function() { toast.remove(); }, 250);
}, 1800);
}

var observer = new IntersectionObserver(function(entries) {
entries.forEach(function(entry) {
if (entry.isIntersecting) {
entry.target.style.animationPlayState = 'running';
observer.unobserve(entry.target);
}
});
}, { threshold: 0.1 });

document.querySelectorAll('[class*="anim-"]').forEach(function(el) {
el.style.animationPlayState = 'paused';
observer.observe(el);
});
</script>
